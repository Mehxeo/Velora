# Builds, signs, and publishes installable artifacts to GitHub Releases on every v* tag.
# electron-updater reads latest.yml / latest-mac.yml from the same release to deliver
# automatic in-app updates to existing installs.
#
# Windows: GitHub asset uploads can exceed the default publisher HTTP timeout on CI; see
# package.json → build.publish[].timeout (ms). The win job retries transient failures.
#
# ── Required secrets ─────────────────────────────────────────────────────────
#   GH_TOKEN                    GitHub PAT (repo scope) — uploads release assets
#   VITE_SUPABASE_URL           Supabase project URL
#   VITE_SUPABASE_ANON_KEY      Supabase anon key
#
# ── Optional secrets (omit to build unsigned) ────────────────────────────────
#   VELORA_BUILTIN_DEEPSEEK_KEY Bundled DeepSeek API key
#   VELORA_BUILTIN_GEMINI_KEY   Bundled Gemini API key
#   MAC_CERTS                   base64-encoded .p12 certificate (Apple Developer ID)
#   MAC_CERTS_PASSWORD          Password for MAC_CERTS
#   APPLE_ID                    Apple ID email (notarization)
#   APPLE_ID_PASSWORD           App-specific password (notarization)
#   APPLE_TEAM_ID               Apple Developer Team ID
#   WIN_CERT                    base64-encoded .p12 (Windows Authenticode)
#   WIN_CERT_PASSWORD           Password for WIN_CERT

name: Release

# Step-level `if:` must not use `secrets.*` (invalid expression context). Branch inside `run:` instead.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build (must exist on the remote, e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write   # create releases + upload assets

jobs:
  # ── Create the GitHub Release first so both OS jobs can upload into it ─────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      git_ref: ${{ steps.meta.outputs.git_ref }}
    steps:
      - name: Resolve release tag and git ref
        id: meta
        run: |
          REF=$(jq -r '.ref // empty' "$GITHUB_EVENT_PATH")
          if [[ "$REF" == refs/tags/* ]]; then
            echo "release_tag=${REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "git_ref=${REF}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(jq -r '.inputs.tag // empty' "$GITHUB_EVENT_PATH")
            if [ -z "$TAG" ]; then
              echo "::error::Set tag via workflow_dispatch input"
              exit 1
            fi
            echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "git_ref=refs/tags/${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: Velora ${{ steps.meta.outputs.release_tag }}
          draft: false
          prerelease: ${{ contains(steps.meta.outputs.release_tag, '-beta') || contains(steps.meta.outputs.release_tag, '-rc') }}
          body: |
            ## Velora ${{ steps.meta.outputs.release_tag }}

            Download the installer for your platform below.

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `Velora-*-mac-arm64.dmg` (or `.zip`) |
            | macOS (Intel) | `Velora-*-mac-x64.dmg` (or `.zip`) |
            | Windows | `Velora-*-win-x64.exe` |

            **First-time install on macOS:** Right-click the app → **Open** the first time, or use **System Settings → Privacy & Security → Open Anyway**. If macOS shows **“damaged”** after download, remove quarantine: `xattr -dr com.apple.quarantine /path/to/Velora.app` (or re-download after updating to the latest release).

            **First-time install on Windows:** If SmartScreen shows a warning, click "More info" → "Run anyway".

            **Existing users:** Velora will notify you automatically — just click "Restart to update".

            ---
            [veloraapp.xyz](https://veloraapp.xyz)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

  # ── macOS build ──────────────────────────────────────────────────────────
  build-mac:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.create-release.outputs.git_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Import Mac certificate
        env:
          MAC_CERTS: ${{ secrets.MAC_CERTS }}
          MAC_CERTS_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
        run: |
          if [ -z "$MAC_CERTS" ]; then
            echo "No MAC_CERTS secret; skipping keychain import."
            exit 0
          fi
          echo "$MAC_CERTS" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$MAC_CERTS_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain
          security set-key-partition-list -S apple-tool:,apple: -k "" build.keychain

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VELORA_BUILTIN_DEEPSEEK_KEY: ${{ secrets.VELORA_BUILTIN_DEEPSEEK_KEY }}
          VELORA_BUILTIN_GEMINI_KEY: ${{ secrets.VELORA_BUILTIN_GEMINI_KEY }}
        run: npm run build

      # Do not set CSC_* when unsigned — empty CSC_LINK makes electron-builder fail with "not a file".
      - name: Package & publish (mac)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MAC_CERTS_B64: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$MAC_CERTS_B64" ]; then
            export CSC_LINK="$MAC_CERTS_B64"
            export CSC_KEY_PASSWORD
            export APPLE_ID APPLE_ID_PASSWORD APPLE_TEAM_ID
            npx electron-builder --mac --publish always
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            # Ad-hoc codesign ("-") keeps the bundle internally consistent for Gatekeeper.
            # Without a Developer ID cert, users still confirm first launch (Open / Open Anyway).
            npx electron-builder --mac --publish always --config.mac.identity="-"
          fi

  # ── Windows build ────────────────────────────────────────────────────────
  build-win:
    needs: create-release
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.create-release.outputs.git_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VELORA_BUILTIN_DEEPSEEK_KEY: ${{ secrets.VELORA_BUILTIN_DEEPSEEK_KEY }}
          VELORA_BUILTIN_GEMINI_KEY: ${{ secrets.VELORA_BUILTIN_GEMINI_KEY }}
        run: npm run build

      - name: Package & publish (win)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          WIN_CSC_LINK: ${{ secrets.WIN_CERT }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        run: |
          set -e
          for attempt in 1 2 3; do
            if npx electron-builder --win --publish always; then
              exit 0
            fi
            echo "::warning::electron-builder publish failed (attempt ${attempt}/3)"
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "Retrying in 90s..."
            sleep 90
          done

