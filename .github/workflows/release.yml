# Builds, signs, and publishes installable artifacts to GitHub Releases on every v* tag.
# electron-updater reads latest.yml / latest-mac.yml from the same release to deliver
# automatic in-app updates to existing installs.
#
# ── Required secrets ─────────────────────────────────────────────────────────
#   GH_TOKEN                    GitHub PAT (repo scope) — uploads release assets
#   VITE_SUPABASE_URL           Supabase project URL
#   VITE_SUPABASE_ANON_KEY      Supabase anon key
#
# ── Optional secrets (omit to build unsigned) ────────────────────────────────
#   VELORA_BUILTIN_DEEPSEEK_KEY Bundled DeepSeek API key
#   VELORA_BUILTIN_GEMINI_KEY   Bundled Gemini API key
#   MAC_CERTS                   base64-encoded .p12 certificate (Apple Developer ID)
#   MAC_CERTS_PASSWORD          Password for MAC_CERTS
#   APPLE_ID                    Apple ID email (notarization)
#   APPLE_ID_PASSWORD           App-specific password (notarization)
#   APPLE_TEAM_ID               Apple Developer Team ID
#   WIN_CERT                    base64-encoded .p12 (Windows Authenticode)
#   WIN_CERT_PASSWORD           Password for WIN_CERT

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build (must exist on the remote, e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write   # create releases + upload assets

jobs:
  # ── Create the GitHub Release first so both OS jobs can upload into it ─────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      git_ref: ${{ steps.meta.outputs.git_ref }}
    steps:
      - name: Resolve release tag and git ref
        id: meta
        run: |
          REF=$(jq -r '.ref // empty' "$GITHUB_EVENT_PATH")
          if [[ "$REF" == refs/tags/* ]]; then
            echo "release_tag=${REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "git_ref=${REF}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(jq -r '.inputs.tag // empty' "$GITHUB_EVENT_PATH")
            if [ -z "$TAG" ]; then
              echo "::error::Set tag via workflow_dispatch input"
              exit 1
            fi
            echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "git_ref=refs/tags/${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: Velora ${{ steps.meta.outputs.release_tag }}
          draft: false
          prerelease: ${{ contains(steps.meta.outputs.release_tag, '-beta') || contains(steps.meta.outputs.release_tag, '-rc') }}
          body: |
            ## Velora ${{ steps.meta.outputs.release_tag }}

            Download the installer for your platform below.

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `Velora-*-mac-arm64.dmg` |
            | macOS (Intel) | `Velora-*-mac-x64.dmg` |
            | Windows | `Velora-*-win-x64.exe` |
            | Linux | `Velora-*-linux-x64.AppImage` |

            **First-time install on macOS:** If Gatekeeper blocks the app, right-click → Open, or go to System Settings → Privacy & Security → Open Anyway.

            **First-time install on Windows:** If SmartScreen shows a warning, click "More info" → "Run anyway".

            **Existing users:** Velora will notify you automatically — just click "Restart to update".

            ---
            [veloraapp.xyz](https://veloraapp.xyz)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

  # ── macOS build ──────────────────────────────────────────────────────────
  build-mac:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.create-release.outputs.git_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Import Mac certificate
        if: ${{ secrets.MAC_CERTS != '' }}
        env:
          MAC_CERTS: ${{ secrets.MAC_CERTS }}
          MAC_CERTS_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
        run: |
          echo "$MAC_CERTS" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$MAC_CERTS_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain
          security set-key-partition-list -S apple-tool:,apple: -k "" build.keychain

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VELORA_BUILTIN_DEEPSEEK_KEY: ${{ secrets.VELORA_BUILTIN_DEEPSEEK_KEY }}
          VELORA_BUILTIN_GEMINI_KEY: ${{ secrets.VELORA_BUILTIN_GEMINI_KEY }}
        run: npm run build

      # Empty CSC_LINK makes electron-builder fail with "not a file" — only set when signing.
      - name: Package & publish (mac, signed)
        if: ${{ secrets.MAC_CERTS != '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --publish always

      - name: Package & publish (mac, unsigned)
        if: ${{ secrets.MAC_CERTS == '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --publish always --config.mac.identity=null --config.mac.hardenedRuntime=false

  # ── Windows build ────────────────────────────────────────────────────────
  build-win:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.create-release.outputs.git_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VELORA_BUILTIN_DEEPSEEK_KEY: ${{ secrets.VELORA_BUILTIN_DEEPSEEK_KEY }}
          VELORA_BUILTIN_GEMINI_KEY: ${{ secrets.VELORA_BUILTIN_GEMINI_KEY }}
        run: npm run build

      - name: Package & publish (win)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          WIN_CSC_LINK: ${{ secrets.WIN_CERT }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        run: npx electron-builder --win --publish always

  # ── Linux build ──────────────────────────────────────────────────────────
  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.create-release.outputs.git_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VELORA_BUILTIN_DEEPSEEK_KEY: ${{ secrets.VELORA_BUILTIN_DEEPSEEK_KEY }}
          VELORA_BUILTIN_GEMINI_KEY: ${{ secrets.VELORA_BUILTIN_GEMINI_KEY }}
        run: npm run build

      - name: Package & publish (linux)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --linux --publish always
