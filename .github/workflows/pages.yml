# Serves docs/index.html at https://<user>.github.io/<repo>/
#
# Uses the gh-pages branch (no configure-pages / Actions-based Pages API).
# One-time: Settings → Pages → Build and deployment → Source: Deploy from a branch
#           Branch: gh-pages, folder: / (root). Save. Future pushes deploy automatically.
name: Deploy download page

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish docs to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
